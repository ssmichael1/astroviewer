name: Build & Release

# Builds packaged binaries for macOS (Apple Silicon), Windows (x64), and
# Linux (x64 + arm64), bundling the SVBony runtime libraries. Uploads a
# per-platform archive artifact on every push/PR, and attaches them to a
# GitHub Release when a `v*` tag is pushed.
#
# Requires three repository variables (Settings -> Secrets and variables ->
# Actions -> Variables) pointing at hosted SVBony SDK zips:
#   SVB_SDK_URL_MACOS    - macOS SDK zip   (contains lib/arm64/...)
#   SVB_SDK_URL_WINDOWS  - Windows SDK zip (contains lib/x64/...)
#   SVB_SDK_URL_LINUX    - Linux SDK zip   (contains lib/x64 and lib/armv8/...)
# And one for the Gaia star catalog bundled into every package (the app builds
# the plate-solver database from it on first run):
#   GAIA_MERGED          - direct URL to the gaia_merged.bin catalog (~17 MB)
# Both downloads are cached; bump the matching *_CACHE_VERSION below to refresh.
#
# Note: Linux GUI binaries are not fully self-contained. They bundle libusb,
# but the target machine must already provide system libraries (OpenGL,
# X11/Wayland, GTK3).

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  FEATURES: "svbony,starsolve"
  SDK_CACHE_VERSION: "v1"
  CATALOG_CACHE_VERSION: "v1"

jobs:
  build:
    name: ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write # needed for the release upload on tags
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: macos
            os: macos-14
          - name: windows
            os: windows-latest
          - name: linux-x64
            os: ubuntu-22.04
            libdir: x64
          - name: linux-arm64
            os: ubuntu-22.04-arm
            libdir: armv8

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Install Linux build deps
        if: runner.os == 'Linux'
        shell: bash
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            libgtk-3-dev \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libwayland-dev libgl1-mesa-dev

      - name: Cache SVBony SDK
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: sdk
          key: ${{ matrix.name }}-svbsdk-${{ env.SDK_CACHE_VERSION }}

      - name: Download SVBony SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          SDK_URL: ${{ startsWith(matrix.name, 'windows') && vars.SVB_SDK_URL_WINDOWS || startsWith(matrix.name, 'linux') && vars.SVB_SDK_URL_LINUX || vars.SVB_SDK_URL_MACOS }}
        run: |
          set -euo pipefail
          if [ -z "${SDK_URL:-}" ]; then
            echo "::error::Repository variable for the SVBony SDK URL is not set."
            echo "::error::Set SVB_SDK_URL_MACOS / SVB_SDK_URL_WINDOWS / SVB_SDK_URL_LINUX under Settings -> Secrets and variables -> Actions -> Variables."
            exit 1
          fi
          PY=$(command -v python3 || command -v python)
          curl -fL "$SDK_URL" -o sdk.zip
          mkdir -p sdk
          "$PY" -c "import zipfile; zipfile.ZipFile('sdk.zip').extractall('sdk')"

      - name: Locate SDK root
        shell: bash
        run: |
          set -euo pipefail
          PY=$(command -v python3 || command -v python)
          LIBDIR=$(find sdk -type d -name lib | head -n1)
          if [ -z "$LIBDIR" ]; then
            echo "::error::Could not find a 'lib' directory inside the extracted SDK."
            exit 1
          fi
          ROOT=$(dirname "$LIBDIR")
          ABS=$("$PY" -c "import os,sys;print(os.path.abspath(sys.argv[1]))" "$ROOT")
          echo "SVBCAMERA_SDK_PATH=$ABS" >> "$GITHUB_ENV"
          echo "Using SVBCAMERA_SDK_PATH=$ABS"

      - name: Cache Gaia catalog
        id: catalog-cache
        uses: actions/cache@v4
        with:
          path: catalog
          key: ${{ matrix.name }}-catalog-${{ env.CATALOG_CACHE_VERSION }}

      - name: Download Gaia catalog
        if: steps.catalog-cache.outputs.cache-hit != 'true'
        shell: bash
        env:
          CATALOG_URL: ${{ vars.GAIA_MERGED }}
        run: |
          set -euo pipefail
          if [ -z "${CATALOG_URL:-}" ]; then
            echo "::error::Repository variable GAIA_MERGED (catalog download URL) is not set."
            exit 1
          fi
          mkdir -p catalog
          curl -fL "$CATALOG_URL" -o catalog/gaia_merged.bin

      - name: Build
        shell: bash
        run: cargo build --release --features "$FEATURES"

      - name: Package (macOS)
        if: matrix.name == 'macos'
        shell: bash
        run: |
          set -euo pipefail
          APP="dist/Viewer.app"
          mkdir -p "$APP/Contents/MacOS" "$APP/Contents/Frameworks" "$APP/Contents/Resources"
          cp target/release/viewer "$APP/Contents/MacOS/viewer"
          cp packaging/macos/Info.plist "$APP/Contents/Info.plist"
          cp "$SVBCAMERA_SDK_PATH/lib/arm64/libusb-1.0.0.dylib" "$APP/Contents/Frameworks/"
          cp catalog/gaia_merged.bin "$APP/Contents/Resources/"
          # Sanity-check that the only non-system dylib dependency is the bundled libusb.
          otool -L "$APP/Contents/MacOS/viewer" || true
          ditto -c -k --keepParent "$APP" dist/viewer-macos.zip
          echo "ASSET=dist/viewer-macos.zip" >> "$GITHUB_ENV"

      - name: Package (Windows)
        if: matrix.name == 'windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist/viewer-windows | Out-Null
          Copy-Item target/release/viewer.exe dist/viewer-windows/
          # Ship every DLL the SDK provides (SVBCameraSDK.dll plus any libusb).
          Copy-Item "$env:SVBCAMERA_SDK_PATH/lib/x64/*.dll" dist/viewer-windows/
          Copy-Item catalog/gaia_merged.bin dist/viewer-windows/
          Compress-Archive -Path dist/viewer-windows/* -DestinationPath dist/viewer-windows.zip -Force
          "ASSET=dist/viewer-windows.zip" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Package (Linux)
        if: runner.os == 'Linux'
        shell: bash
        run: |
          set -euo pipefail
          OUT="viewer-${{ matrix.name }}"
          mkdir -p "dist/$OUT"
          cp target/release/viewer "dist/$OUT/viewer"
          # The SDK is statically linked; only libusb is dynamic. Copy the
          # versioned .so files + symlinks (-P preserves the symlinks) for the
          # build's architecture. The `$ORIGIN` rpath makes them resolve.
          cp -P "$SVBCAMERA_SDK_PATH/lib/${{ matrix.libdir }}"/libusb-1.0.so* "dist/$OUT/"
          cp catalog/gaia_merged.bin "dist/$OUT/"
          ldd "dist/$OUT/viewer" | grep -i usb || true
          tar -czf "dist/$OUT.tar.gz" -C dist "$OUT"
          echo "ASSET=dist/$OUT.tar.gz" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: viewer-${{ matrix.name }}
          path: ${{ env.ASSET }}
          # Bound per-push artifact accumulation in Actions storage. Tagged
          # release assets are attached separately below and are unaffected.
          retention-days: 14

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.ASSET }}
