[package]
name = "viewer"
version = "0.1.0"
edition = "2021"

[dependencies]
eframe = "0.31"
egui = "0.31"
egui_plot = "0.31"
image = "0.25"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
crossbeam-channel = "0.5"
chrono = "0.4"
fits4 = { path = "../fits4" }
rfd = "0.15"
svbony = { version = "0.1", features = ["image"], optional = true }

[features]
default = []
svbony = ["dep:svbony"]

[profile.test]
opt-level = 3

[profile.release]
opt-level = 3
