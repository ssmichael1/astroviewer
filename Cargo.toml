[package]
name = "viewer"
version = "0.1.0"
edition = "2021"

[dependencies]
iced = { version = "0.14", features = ["canvas", "image", "tokio"] }
image = "0.25"
anyhow = "1"
tracing = "0.1"
tracing-subscriber = "0.3"
crossbeam-channel = "0.5"

[profile.test]
opt-level = 3

[profile.release]
opt-level = 3
